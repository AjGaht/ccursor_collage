<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Property Collage Creator</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <h1><i class="fas fa-home"></i> Property Collage Creator</h1>
            <p>Create professional property listing collages for apartments and villas</p>
        </header>

        <div class="main-content">
            <!-- Image Upload Section -->
            <div class="upload-section">
                <h2>Upload Images</h2>
                <div class="upload-area" id="uploadArea">
                    <div class="upload-content">
                        <i class="fas fa-cloud-upload-alt"></i>
                        <p>Drag and drop images here or click to browse</p>
                        <p class="upload-hint">Upload 1-3 images for your property collage</p>
                    </div>
                    <input type="file" id="imageInput" multiple accept="image/*" style="display: none;">
                </div>
                <div class="image-preview" id="imagePreview"></div>
            </div>

            <!-- Property Details Form -->
            <div class="form-section">
                <h2>Property Details</h2>
                <form id="propertyForm">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="listingType">Listing Type</label>
                            <select id="listingType" required>
                                <option value="sale">Sale</option>
                                <option value="rent">Rent</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="price">Price (AED)</label>
                            <input type="number" id="price" required placeholder="e.g., 1700000">
                        </div>
                        <div class="form-group">
                            <label for="priceUnit">Price Unit</label>
                            <select id="priceUnit">
                                <option value="">One-time</option>
                                <option value="/ YEAR">/ YEAR</option>
                                <option value="/ MONTH">/ MONTH</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="bedrooms">Bedrooms</label>
                            <input type="number" id="bedrooms" min="0" required>
                        </div>
                        <div class="form-group">
                            <label for="bathrooms">Bathrooms</label>
                            <input type="number" id="bathrooms" min="0" required>
                        </div>
                        <div class="form-group">
                            <label for="area">Area (ft²)</label>
                            <input type="number" id="area" required placeholder="e.g., 601">
                        </div>
                        <div class="form-group">
                            <label for="propertyType">Property Type</label>
                            <select id="propertyType" required>
                                <option value="Apartment">Apartment</option>
                                <option value="Villa">Villa</option>
                                <option value="Townhouse">Townhouse</option>
                                <option value="Penthouse">Penthouse</option>
                                <option value="Studio">Studio</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="address">Property Address</label>
                        <textarea id="address" rows="2" required placeholder="Enter full property address"></textarea>
                    </div>
                </form>
            </div>

            <!-- Agent Information -->
            <div class="form-section">
                <h2>Agent Information</h2>
                <form id="agentForm">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="agentName">Agent Name</label>
                            <input type="text" id="agentName" required placeholder="e.g., James Gathungu">
                        </div>
                        <div class="form-group">
                            <label for="company">Company</label>
                            <input type="text" id="company" required placeholder="e.g., Empire Infratech Real Estate">
                        </div>
                        <div class="form-group">
                            <label for="phone">Phone Number</label>
                            <input type="tel" id="phone" required placeholder="e.g., +971 56 998 2269">
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="agentPhoto">Agent Photo (Optional)</label>
                        <input type="file" id="agentPhoto" accept="image/*">
                    </div>
                </form>
            </div>

            <!-- Generate Collage Button -->
            <div class="action-section">
                <button id="generateBtn" class="generate-btn">
                    <i class="fas fa-magic"></i> Generate Collage
                </button>
            </div>

            <!-- Collage Preview -->
            <div class="collage-section" id="collageSection" style="display: none;">
                <h2>Generated Collage</h2>
                <div class="collage-container">
                    <canvas id="collageCanvas"></canvas>
                </div>
                <div class="collage-actions">
                    <button id="downloadBtn" class="download-btn">
                        <i class="fas fa-download"></i> Download Collage
                    </button>
                    <button id="newCollageBtn" class="new-btn">
                        <i class="fas fa-plus"></i> Create New Collage
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
